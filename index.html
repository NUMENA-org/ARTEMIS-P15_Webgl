<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>ARTEMIS-P15</title>
	<style>
		html,
		body {
			background-color: #1A3C62;
			background-image: url('background.jpg');
			background-repeat: no-repeat;
			background-position: center center;
			background-attachment: fixed;
			width: 100%;
			height: 100%;
			overflow: hidden;
			padding: 0;
			margin: 0;
		}

		/* Loading: show entire image and canvas area (letterbox if needed). */
		body.webgl-loading {
			background-size: contain;
		}

		/* Running: full-bleed background (same as before load completes). */
		body.webgl-loaded {
			background-size: cover;
		}

		div#gameContainer {
			background: transparent !important;
			position: fixed;
			top: 0;
			left: 0;
			overflow: hidden;
		}

		div#gameContainer canvas {
			position: absolute;
			-webkit-user-select: none;
			user-select: none;
		}

		div#gameContainer canvas[data-pixel-art="true"] {
			position: absolute;
			image-rendering: optimizeSpeed;
			image-rendering: -webkit-crisp-edges;
			image-rendering: -moz-crisp-edges;
			image-rendering: -o-crisp-edges;
			image-rendering: crisp-edges;
			image-rendering: -webkit-optimize-contrast;
			image-rendering: optimize-contrast;
			image-rendering: pixelated;
			-ms-interpolation-mode: nearest-neighbor;
		}
	</style>
</head>

<body class="webgl-loading">
	<div id="gameContainer">
		<canvas id="unity-canvas" width="960" height="600" data-pixel-art=""></canvas>
		<script src="Build/ARTEMIS-P15_Webgl.loader.js"></script>
		<script>
			var canvas = document.querySelector("#unity-canvas");
			var config = {
				dataUrl: "Build/ARTEMIS-P15_Webgl.data",
				frameworkUrl: "Build/ARTEMIS-P15_Webgl.framework.js",
				codeUrl: "Build/ARTEMIS-P15_Webgl.wasm",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "NUMENA",
				productName: "ARTEMIS-P15",
				productVersion: "0.2.6",
				autoSyncPersistentDataPath: true,
			};
			function progressHandler(progress) {
				var percent = progress * 100 + '%';
				canvas.style.background = 'linear-gradient(to right, white, white ' + percent + ', transparent ' + percent + ', transparent) no-repeat center';
				canvas.style.backgroundSize = '100% 1rem';
			}
			var gameLoaded = false;
			var gameWidth = 960;
			var gameHeight = 600;

			function onResize() {
				var container = canvas.parentElement;
				var w;
				var h;

				if (!gameLoaded) {
					w = window.innerWidth;
					h = window.innerHeight;
					var r = gameHeight / gameWidth;
					if (w * r > window.innerHeight) {
						w = Math.min(w, Math.ceil(h / r));
					}
					h = Math.floor(w * r);
					container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
					container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
				} else {
					w = window.innerWidth;
					h = window.innerHeight;
					container.style.top = "0px";
					container.style.left = "0px";
				}

				container.style.width = canvas.style.width = w + "px";
				container.style.height = canvas.style.height = h + "px";
				window.focus();
			}
			createUnityInstance(canvas, config, progressHandler).then(function (instance) {
				canvas = instance.Module.canvas;
				canvas.style.background = "";
				canvas.style.backgroundSize = "";
				document.body.classList.remove("webgl-loading");
				document.body.classList.add("webgl-loaded");
				gameLoaded = true;
				onResize();
			});
			window.addEventListener('resize', onResize);
			onResize();

			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
				// Mobile device style: fill the whole browser client area with the game canvas:
				const meta = document.createElement('meta');
				meta.name = 'viewport';
				meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
				document.getElementsByTagName('head')[0].appendChild(meta);
			}
		</script>
	</div>
</body>

</html>
